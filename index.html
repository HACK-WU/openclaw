<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>待办事项 - Todo List</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary-color: #667eea;
        --primary-dark: #5a67d8;
        --success-color: #48bb78;
        --danger-color: #f56565;
        --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        --item-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--bg-gradient);
        min-height: 100vh;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .container {
        width: 100%;
        max-width: 600px;
        margin-top: 20px;
      }

      .todo-app {
        background: white;
        border-radius: 20px;
        box-shadow: var(--card-shadow);
        overflow: hidden;
        animation: slideUp 0.5s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        background: var(--bg-gradient);
        color: white;
        padding: 30px;
        text-align: center;
      }

      .header h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .header p {
        opacity: 0.9;
        font-size: 0.95rem;
      }

      .stats {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }

      .stat-item {
        text-align: center;
      }

      .stat-number {
        font-size: 1.8rem;
        font-weight: 700;
        display: block;
      }

      .stat-label {
        font-size: 0.8rem;
        opacity: 0.8;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .input-section {
        padding: 25px;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
      }

      .input-wrapper {
        display: flex;
        gap: 12px;
      }

      .task-input {
        flex: 1;
        padding: 14px 18px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.3s ease;
        outline: none;
      }

      .task-input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .task-input::placeholder {
        color: #a0aec0;
      }

      .add-btn {
        padding: 14px 28px;
        background: var(--bg-gradient);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
      }

      .add-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }

      .add-btn:active {
        transform: translateY(0);
      }

      .filter-section {
        padding: 15px 25px;
        display: flex;
        gap: 10px;
        border-bottom: 1px solid #e2e8f0;
        flex-wrap: wrap;
      }

      .filter-btn {
        padding: 8px 16px;
        border: none;
        background: #e2e8f0;
        color: #4a5568;
        border-radius: 20px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .filter-btn:hover {
        background: #cbd5e0;
      }

      .filter-btn.active {
        background: var(--primary-color);
        color: white;
      }

      .todo-list {
        list-style: none;
        padding: 15px;
        max-height: 400px;
        overflow-y: auto;
      }

      .todo-list::-webkit-scrollbar {
        width: 6px;
      }

      .todo-list::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 3px;
      }

      .todo-list::-webkit-scrollbar-thumb {
        background: #cbd5e0;
        border-radius: 3px;
      }

      .todo-item {
        display: flex;
        align-items: center;
        padding: 15px;
        background: white;
        border-radius: 12px;
        margin-bottom: 10px;
        box-shadow: var(--item-shadow);
        transition: all 0.3s ease;
        animation: fadeIn 0.3s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .todo-item:hover {
        transform: translateX(5px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .todo-item.completed {
        background: #f0fff4;
      }

      .todo-item.completed .todo-text {
        text-decoration: line-through;
        color: #a0aec0;
      }

      .todo-item.removing {
        animation: slideOut 0.3s ease-out forwards;
      }

      @keyframes slideOut {
        to {
          opacity: 0;
          transform: translateX(100px);
        }
      }

      .checkbox-wrapper {
        position: relative;
        width: 24px;
        height: 24px;
        margin-right: 15px;
      }

      .checkbox {
        position: absolute;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
        z-index: 2;
      }

      .checkmark {
        position: absolute;
        top: 0;
        left: 0;
        width: 24px;
        height: 24px;
        border: 2px solid #cbd5e0;
        border-radius: 6px;
        transition: all 0.3s ease;
      }

      .checkbox:checked + .checkmark {
        background: var(--success-color);
        border-color: var(--success-color);
      }

      .checkmark::after {
        content: "";
        position: absolute;
        display: none;
        left: 7px;
        top: 3px;
        width: 6px;
        height: 12px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .checkbox:checked + .checkmark::after {
        display: block;
        animation: checkAnim 0.2s ease-out;
      }

      @keyframes checkAnim {
        from {
          transform: rotate(45deg) scale(0);
        }
        to {
          transform: rotate(45deg) scale(1);
        }
      }

      .todo-text {
        flex: 1;
        font-size: 1rem;
        color: #2d3748;
        word-break: break-word;
      }

      .delete-btn {
        width: 36px;
        height: 36px;
        border: none;
        background: #fed7d7;
        color: var(--danger-color);
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        opacity: 0;
        margin-left: 10px;
      }

      .todo-item:hover .delete-btn {
        opacity: 1;
      }

      .delete-btn:hover {
        background: var(--danger-color);
        color: white;
        transform: scale(1.1);
      }

      .delete-btn svg {
        width: 18px;
        height: 18px;
      }

      .empty-state {
        text-align: center;
        padding: 50px 20px;
        color: #a0aec0;
      }

      .empty-state svg {
        width: 80px;
        height: 80px;
        margin-bottom: 20px;
        opacity: 0.5;
      }

      .empty-state p {
        font-size: 1.1rem;
      }

      .footer {
        padding: 15px 25px;
        background: #f8fafc;
        border-top: 1px solid #e2e8f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .footer-text {
        color: #718096;
        font-size: 0.9rem;
      }

      .clear-completed {
        padding: 8px 16px;
        border: none;
        background: transparent;
        color: var(--danger-color);
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
        border-radius: 6px;
      }

      .clear-completed:hover {
        background: #fed7d7;
      }

      /* 响应式设计 */
      @media (max-width: 480px) {
        body {
          padding: 10px;
        }

        .container {
          margin-top: 10px;
        }

        .header {
          padding: 20px;
        }

        .header h1 {
          font-size: 1.5rem;
        }

        .stats {
          gap: 20px;
        }

        .stat-number {
          font-size: 1.4rem;
        }

        .input-section {
          padding: 15px;
        }

        .input-wrapper {
          flex-direction: column;
        }

        .add-btn {
          width: 100%;
        }

        .filter-section {
          padding: 12px 15px;
          justify-content: center;
        }

        .filter-btn {
          padding: 6px 12px;
          font-size: 0.85rem;
        }

        .todo-list {
          padding: 10px;
        }

        .todo-item {
          padding: 12px;
        }

        .delete-btn {
          opacity: 1;
        }

        .footer {
          padding: 12px 15px;
          justify-content: center;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="todo-app">
        <div class="header">
          <h1>📝 待办事项</h1>
          <p>高效管理你的每一天</p>
          <div class="stats">
            <div class="stat-item">
              <span class="stat-number" id="totalTasks">0</span>
              <span class="stat-label">总任务</span>
            </div>
            <div class="stat-item">
              <span class="stat-number" id="completedTasks">0</span>
              <span class="stat-label">已完成</span>
            </div>
            <div class="stat-item">
              <span class="stat-number" id="pendingTasks">0</span>
              <span class="stat-label">待完成</span>
            </div>
          </div>
        </div>

        <div class="input-section">
          <div class="input-wrapper">
            <input
              type="text"
              class="task-input"
              id="taskInput"
              placeholder="输入新任务，按回车添加..."
              autocomplete="off"
            />
            <button class="add-btn" id="addBtn">添加任务</button>
          </div>
        </div>

        <div class="filter-section">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="pending">待完成</button>
          <button class="filter-btn" data-filter="completed">已完成</button>
        </div>

        <ul class="todo-list" id="todoList">
          <!-- 任务列表将在这里动态生成 -->
        </ul>

        <div class="footer">
          <span class="footer-text" id="footerText">暂无任务</span>
          <button class="clear-completed" id="clearCompleted">清除已完成</button>
        </div>
      </div>
    </div>

    <script>
      // 应用状态
      let todos = [];
      let currentFilter = "all";

      // DOM 元素
      const taskInput = document.getElementById("taskInput");
      const addBtn = document.getElementById("addBtn");
      const todoList = document.getElementById("todoList");
      const filterBtns = document.querySelectorAll(".filter-btn");
      const clearCompletedBtn = document.getElementById("clearCompleted");
      const totalTasksEl = document.getElementById("totalTasks");
      const completedTasksEl = document.getElementById("completedTasks");
      const pendingTasksEl = document.getElementById("pendingTasks");
      const footerTextEl = document.getElementById("footerText");

      // 从 localStorage 加载数据
      function loadTodos() {
        const stored = localStorage.getItem("todos");
        if (stored) {
          todos = JSON.parse(stored);
        }
      }

      // 保存数据到 localStorage
      function saveTodos() {
        localStorage.setItem("todos", JSON.stringify(todos));
      }

      // 生成唯一 ID
      function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2);
      }

      // 添加新任务
      function addTodo(text) {
        if (!text.trim()) return;

        const todo = {
          id: generateId(),
          text: text.trim(),
          completed: false,
          createdAt: new Date().toISOString(),
        };

        todos.unshift(todo);
        saveTodos();
        renderTodos();
        taskInput.value = "";
        taskInput.focus();
      }

      // 切换任务完成状态
      function toggleTodo(id) {
        const todo = todos.find((t) => t.id === id);
        if (todo) {
          todo.completed = !todo.completed;
          saveTodos();
          renderTodos();
        }
      }

      // 删除任务
      function deleteTodo(id) {
        const item = document.querySelector(`[data-id="${id}"]`);
        if (item) {
          item.classList.add("removing");
          setTimeout(() => {
            todos = todos.filter((t) => t.id !== id);
            saveTodos();
            renderTodos();
          }, 300);
        }
      }

      // 清除已完成任务
      function clearCompleted() {
        const completedItems = document.querySelectorAll(".todo-item.completed");
        completedItems.forEach((item) => {
          item.classList.add("removing");
        });

        setTimeout(() => {
          todos = todos.filter((t) => !t.completed);
          saveTodos();
          renderTodos();
        }, 300);
      }

      // 获取过滤后的任务列表
      function getFilteredTodos() {
        switch (currentFilter) {
          case "pending":
            return todos.filter((t) => !t.completed);
          case "completed":
            return todos.filter((t) => t.completed);
          default:
            return todos;
        }
      }

      // 更新统计数据
      function updateStats() {
        const total = todos.length;
        const completed = todos.filter((t) => t.completed).length;
        const pending = total - completed;

        totalTasksEl.textContent = total;
        completedTasksEl.textContent = completed;
        pendingTasksEl.textContent = pending;

        // 更新页脚文本
        if (total === 0) {
          footerTextEl.textContent = "暂无任务";
        } else if (pending === 0) {
          footerTextEl.textContent = "🎉 太棒了！所有任务已完成";
        } else {
          footerTextEl.textContent = `还有 ${pending} 个任务待完成`;
        }
      }

      // 渲染任务列表
      function renderTodos() {
        const filteredTodos = getFilteredTodos();

        if (filteredTodos.length === 0) {
          let emptyMessage = "暂无任务";
          if (currentFilter === "pending") {
            emptyMessage = "没有待完成的任务";
          } else if (currentFilter === "completed") {
            emptyMessage = "没有已完成的任务";
          }

          todoList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                        </svg>
                        <p>${emptyMessage}</p>
                    </div>
                `;
        } else {
          todoList.innerHTML = filteredTodos
            .map(
              (todo) => `
                    <li class="todo-item ${todo.completed ? "completed" : ""}" data-id="${todo.id}">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" class="checkbox" ${todo.completed ? "checked" : ""} onchange="toggleTodo('${todo.id}')">
                            <span class="checkmark"></span>
                        </label>
                        <span class="todo-text">${escapeHtml(todo.text)}</span>
                        <button class="delete-btn" onclick="deleteTodo('${todo.id}')" title="删除任务">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </li>
                `,
            )
            .join("");
        }

        updateStats();
      }

      // HTML 转义，防止 XSS
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // 设置过滤器
      function setFilter(filter) {
        currentFilter = filter;
        filterBtns.forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.filter === filter);
        });
        renderTodos();
      }

      // 事件监听
      addBtn.addEventListener("click", () => addTodo(taskInput.value));

      taskInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          addTodo(taskInput.value);
        }
      });

      filterBtns.forEach((btn) => {
        btn.addEventListener("click", () => setFilter(btn.dataset.filter));
      });

      clearCompletedBtn.addEventListener("click", clearCompleted);

      // 初始化
      loadTodos();
      renderTodos();
    </script>
  </body>
</html>

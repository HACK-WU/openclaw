<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beautiful Todo List</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 30px;
        text-align: center;
      }

      .header h1 {
        color: white;
        font-size: 2.5em;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }

      .stats {
        display: flex;
        justify-content: space-around;
        color: white;
        margin-top: 20px;
        font-size: 0.9em;
      }

      .stat-item {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .stat-number {
        font-size: 1.8em;
        font-weight: bold;
        margin-bottom: 5px;
      }

      .stat-label {
        opacity: 0.9;
        text-transform: uppercase;
        font-size: 0.8em;
        letter-spacing: 1px;
      }

      .input-section {
        padding: 30px;
        border-bottom: 1px solid #f0f0f0;
      }

      .input-wrapper {
        display: flex;
        gap: 10px;
      }

      #todoInput {
        flex: 1;
        padding: 15px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 50px;
        font-size: 1em;
        outline: none;
        transition: border-color 0.3s;
      }

      #todoInput:focus {
        border-color: #667eea;
      }

      #addBtn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 50px;
        font-size: 1em;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        font-weight: bold;
      }

      #addBtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      #addBtn:active {
        transform: translateY(0);
      }

      .filter-section {
        padding: 20px 30px;
        display: flex;
        justify-content: center;
        gap: 10px;
        border-bottom: 1px solid #f0f0f0;
      }

      .filter-btn {
        padding: 8px 20px;
        border: 2px solid #e0e0e0;
        background: white;
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 0.9em;
        font-weight: 500;
      }

      .filter-btn:hover {
        border-color: #667eea;
        color: #667eea;
      }

      .filter-btn.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-color: transparent;
      }

      .todo-list {
        padding: 20px 30px;
        max-height: 400px;
        overflow-y: auto;
      }

      .todo-list::-webkit-scrollbar {
        width: 8px;
      }

      .todo-list::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
      }

      .todo-list::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 10px;
      }

      .todo-item {
        display: flex;
        align-items: center;
        padding: 15px;
        margin-bottom: 10px;
        background: #f8f9fa;
        border-radius: 12px;
        transition: all 0.3s;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .todo-item:hover {
        background: #e9ecef;
        transform: translateX(5px);
      }

      .todo-item.completed {
        opacity: 0.6;
      }

      .todo-item.completed .todo-text {
        text-decoration: line-through;
        color: #999;
      }

      .checkbox {
        width: 24px;
        height: 24px;
        min-width: 24px;
        border: 2px solid #667eea;
        border-radius: 50%;
        margin-right: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
      }

      .checkbox:hover {
        background: #f0f3ff;
      }

      .checkbox.checked {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-color: transparent;
      }

      .checkbox.checked::after {
        content: "✓";
        color: white;
        font-size: 14px;
        font-weight: bold;
      }

      .todo-text {
        flex: 1;
        font-size: 1em;
        color: #333;
        word-break: break-word;
      }

      .delete-btn {
        background: #ff6b6b;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9em;
        transition: all 0.3s;
        opacity: 0;
      }

      .todo-item:hover .delete-btn {
        opacity: 1;
      }

      .delete-btn:hover {
        background: #ff5252;
        transform: scale(1.05);
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #999;
      }

      .empty-state-icon {
        font-size: 4em;
        margin-bottom: 10px;
      }

      .empty-state-text {
        font-size: 1.2em;
      }

      @media (max-width: 600px) {
        .header h1 {
          font-size: 2em;
        }

        .stats {
          font-size: 0.8em;
        }

        .input-wrapper {
          flex-direction: column;
        }

        #addBtn {
          width: 100%;
        }

        .filter-section {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>My Todo List</h1>
        <div class="stats">
          <div class="stat-item">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="completedCount">0</div>
            <div class="stat-label">Completed</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="remainingCount">0</div>
            <div class="stat-label">Remaining</div>
          </div>
        </div>
      </div>

      <div class="input-section">
        <div class="input-wrapper">
          <input type="text" id="todoInput" placeholder="What needs to be done?" />
          <button id="addBtn">Add</button>
        </div>
      </div>

      <div class="filter-section">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <div class="todo-list" id="todoList">
        <div class="empty-state">
          <div class="empty-state-icon">📝</div>
          <div class="empty-state-text">No todos yet. Add one to get started!</div>
        </div>
      </div>
    </div>

    <script>
      // State management
      let todos = [];
      let currentFilter = "all";

      // DOM elements
      const todoInput = document.getElementById("todoInput");
      const addBtn = document.getElementById("addBtn");
      const todoList = document.getElementById("todoList");
      const filterBtns = document.querySelectorAll(".filter-btn");
      const totalCount = document.getElementById("totalCount");
      const completedCount = document.getElementById("completedCount");
      const remainingCount = document.getElementById("remainingCount");

      // Initialize app
      function init() {
        loadTodos();
        renderTodos();
        updateStats();
      }

      // Load todos from localStorage
      function loadTodos() {
        const stored = localStorage.getItem("todos");
        if (stored) {
          todos = JSON.parse(stored);
        }
      }

      // Save todos to localStorage
      function saveTodos() {
        localStorage.setItem("todos", JSON.stringify(todos));
      }

      // Add new todo
      function addTodo() {
        const text = todoInput.value.trim();
        if (text === "") {
          todoInput.focus();
          return;
        }

        const todo = {
          id: Date.now(),
          text: text,
          completed: false,
        };

        todos.unshift(todo);
        todoInput.value = "";
        saveTodos();
        renderTodos();
        updateStats();
        todoInput.focus();
      }

      // Toggle todo completion
      function toggleTodo(id) {
        const todo = todos.find((t) => t.id === id);
        if (todo) {
          todo.completed = !todo.completed;
          saveTodos();
          renderTodos();
          updateStats();
        }
      }

      // Delete todo
      function deleteTodo(id) {
        todos = todos.filter((t) => t.id !== id);
        saveTodos();
        renderTodos();
        updateStats();
      }

      // Filter todos
      function getFilteredTodos() {
        switch (currentFilter) {
          case "active":
            return todos.filter((t) => !t.completed);
          case "completed":
            return todos.filter((t) => t.completed);
          default:
            return todos;
        }
      }

      // Render todos
      function renderTodos() {
        const filteredTodos = getFilteredTodos();

        if (filteredTodos.length === 0) {
          let message = "No todos yet. Add one to get started!";
          let icon = "📝";

          if (currentFilter === "active" && todos.length > 0) {
            message = "All tasks completed! Great job!";
            icon = "🎉";
          } else if (currentFilter === "completed") {
            message = "No completed tasks yet.";
            icon = "✅";
          }

          todoList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">${icon}</div>
                        <div class="empty-state-text">${message}</div>
                    </div>
                `;
          return;
        }

        todoList.innerHTML = filteredTodos
          .map(
            (todo) => `
                <div class="todo-item ${todo.completed ? "completed" : ""}">
                    <div class="checkbox ${todo.completed ? "checked" : ""}" onclick="toggleTodo(${todo.id})"></div>
                    <div class="todo-text">${escapeHtml(todo.text)}</div>
                    <button class="delete-btn" onclick="deleteTodo(${todo.id})">Delete</button>
                </div>
            `,
          )
          .join("");
      }

      // Update statistics
      function updateStats() {
        const total = todos.length;
        const completed = todos.filter((t) => t.completed).length;
        const remaining = total - completed;

        totalCount.textContent = total;
        completedCount.textContent = completed;
        remainingCount.textContent = remaining;
      }

      // Set filter
      function setFilter(filter) {
        currentFilter = filter;
        filterBtns.forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.filter === filter);
        });
        renderTodos();
      }

      // Escape HTML to prevent XSS
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Event listeners
      addBtn.addEventListener("click", addTodo);
      todoInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          addTodo();
        }
      });

      filterBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          setFilter(btn.dataset.filter);
        });
      });

      // Initialize app
      init();
    </script>
  </body>
</html>
